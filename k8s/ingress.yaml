apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudpulse
  namespace: cloudpulse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: cloudpulse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudpulse-web
                port:
                  number: 3000
